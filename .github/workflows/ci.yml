name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, typecheck & unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  # Vercel creates preview deployments automatically on every PR via its
  # GitHub integration (https://vercel.com/docs/deployments/preview-deployments).
  # The job below checks that the preview URL is reachable once Vercel finishes.
  # Requires VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID secrets.
  preview-check:
    name: Verify Vercel preview
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for Vercel preview and check health
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not set — skipping preview check"
            exit 0
          fi

          # Get the most recent preview deployment URL for this branch
          BRANCH="${{ github.head_ref }}"
          echo "Fetching preview URL for branch: $BRANCH"

          PREVIEW_URL=$(npx vercel ls --token "$VERCEL_TOKEN" --scope "$VERCEL_ORG_ID" 2>/dev/null \
            | grep "$BRANCH" | head -1 | awk '{print $2}')

          if [ -z "$PREVIEW_URL" ]; then
            echo "No preview URL found yet — Vercel may still be building"
            exit 0
          fi

          echo "Preview URL: https://$PREVIEW_URL"

          # Poll /api/health until ready (max 3 min)
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$PREVIEW_URL/api/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "503" ]; then
              echo "Preview is up"
              exit 0
            fi
            sleep 10
          done

          echo "Preview did not become ready in time"
          exit 1
